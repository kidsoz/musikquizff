<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>🎵 Spotify Musikquiz</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      line-height: 1.5;
    }
    button, select {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    #options button {
      display: block;
      width: 100%;
      text-align: left;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>

<h1>🎵 Spotify Musikquiz</h1>

<p>Välj en officiell Spotify‑spellista:</p>

<select id="playlistSelect">
  <option value="37i9dQZF1DXcBWIGoYBM5M">Top 50 Global</option>
  <option value="37i9dQZF1DX4cSj6yP6Lyf">Top 50 Sweden</option>
  <option value="37i9dQZF1DX1h5H5JzRz9v">Viral 50 Global</option>
</select>

<br />
<button id="start">Starta quiz</button>

<p id="status"></p>

<hr />

<h2 id="question"></h2>
<audio id="audio" controls></audio>

<div id="options"></div>

<p id="score"></p>
<button id="next" style="display:none;">Nästa låt</button>

<script>
  // ✅ Din Cloudflare‑proxy
  const PROXY_URL = "https://spotify-proxy.joeljohansson89.workers.dev";

  let tracks = [];
  let index = 0;
  let score = 0;

  document.getElementById("start").onclick = loadPlaylist;
  document.getElementById("next").onclick = nextQuestion;

  async function loadPlaylist() {
    const playlistId = document.getElementById("playlistSelect").value;
    const status = document.getElementById("status");

    status.textContent = "⏳ Laddar spellista…";

    const res = await fetch(`${PROXY_URL}/?playlist=${playlistId}`);
    const data = await res.json();

    if (!data.ok) {
      status.textContent = "❌ Kunde inte läsa spellistan";
      return;
    }

    tracks = data.items
      .map(i => i.track)
      .filter(t => t && t.preview_url);

    if (tracks.length < 3) {
      status.textContent = "❌ För få låtar med preview";
      return;
    }

    score = 0;
    index = 0;
    status.textContent = `✅ ${tracks.length} låtar klara`;
    nextQuestion();
  }

  function nextQuestion() {
    document.getElementById("next").style.display = "none";
    document.getElementById("options").innerHTML = "";

    const track = tracks[index];
    document.getElementById("question").textContent = "Vilken låt är detta?";
    document.getElementById("audio").src = track.preview_url;
    document.getElementById("audio").play();

    const options = createOptions(track.name);
    options.forEach(name => {
      const btn = document.createElement("button");
      btn.textContent = name;
      btn.onclick = () => answer(name === track.name);
      document.getElementById("options").appendChild(btn);
    });

    document.getElementById("score").textContent = `Poäng: ${score}`;
  }

  function createOptions(correct) {
    const others = tracks
      .filter(t => t.name !== correct)
      .sort(() => Math.random() - 0.5)
      .slice(0, 2)
      .map(t => t.name);

    return [...others, correct].sort(() => Math.random() - 0.5);
  }

  function answer(correct) {
    alert(correct ? "✅ Rätt!" : "❌ Fel!");
    if (correct) score++;
    document.getElementById("score").textContent = `Poäng: ${score}`;

    index++;
    if (index < tracks.length) {
      document.getElementById("next").style.display = "inline";
    } else {
      alert(`🎉 Quiz klart! Slutpoäng: ${score}`);
      score = 0;
      index = 0;
    }
  }
</script>

</body>
</html>
