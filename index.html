<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>🎵 Spotify Musikquiz</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
    }
    button, input {
      padding: 0.5rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      width: 100%;
    }
    #options button {
      margin-top: 0.3rem;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>🎵 Spotify Musikquiz</h1>

<button id="login">Logga in med Spotify</button>

<p id="status"></p>

<hr>

<input id="playlistId" placeholder="cb562e24e68e49bdb497b65bc42cd010" />
<button id="load">Starta quiz</button>

<h2 id="question"></h2>
<audio id="audio" controls></audio>
<div id="options"></div>
<p id="score"></p>
<button id="next" style="display:none;">Nästa</button>

<script>
/* =========================
   KONFIG
========================= */
const CLIENT_ID = "DITT_SPOTIFY_CLIENT_ID";
const REDIRECT_URI = "https://kidsoz.github.io/musikquizff/";
const SCOPES = "playlist-read-public";

/* =========================
   PKCE-HJÄLP
========================= */
function generateVerifier() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let str = "";
  for (let i = 0; i < 64; i++) {
    str += chars[Math.floor(Math.random() * chars.length)];
  }
  return str;
}

async function generateChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

/* =========================
   LOGIN
========================= */
document.getElementById("login").onclick = async () => {
  const verifier = generateVerifier();
  localStorage.setItem("verifier", verifier);
  const challenge = await generateChallenge(verifier);

  const url =
    "https://accounts.spotify.com/authorize" +
    "?client_id=" + CLIENT_ID +
    "&response_type=code" +
    "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
    "&scope=" + SCOPES +
    "&code_challenge_method=S256" +
    "&code_challenge=" + challenge;

  window.location.href = url;
};

/* =========================
   TOKEN-UTBYTE
========================= */
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if (code) getToken(code);

async function getToken(code) {
  const verifier = localStorage.getItem("verifier");

  const body = new URLSearchParams({
    grant_type: "authorization_code",
    code,
    redirect_uri: REDIRECT_URI,
    client_id: CLIENT_ID,
    code_verifier: verifier
  });

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body
  });

  const data = await res.json();
  localStorage.setItem("token", data.access_token);
  document.getElementById("status").textContent = "✅ Inloggad!";
  window.history.replaceState({}, document.title, REDIRECT_URI);
}

/* =========================
   QUIZ
========================= */
let tracks = [];
let index = 0;
let score = 0;

document.getElementById("load").onclick = loadPlaylist;
document.getElementById("next").onclick = nextQuestion;

async function loadPlaylist() {
  const id = document.getElementById("playlistId").value.trim();
  const token = localStorage.getItem("token");

  const res = await fetch(
    `https://api.spotify.com/v1/playlists/${id}/tracks`,
    {
      headers: { Authorization: `Bearer ${token}` }
    }
  );

  const data = await res.json();
  tracks = data.items.map(i => i.track).filter(t => t.preview_url);

  index = 0;
  score = 0;
  nextQuestion();
}

function nextQuestion() {
  document.getElementById("next").style.display = "none";
  const track = tracks[index];
  document.getElementById("question").textContent = "Vilken låt är detta?";
  document.getElementById("audio").src = track.preview_url;
  document.getElementById("audio").play();

  const options = tracks
    .filter(t => t.name !== track.name)
    .sort(() => Math.random() - 0.5)
    .slice(0, 2)
    .map(t => t.name)
    .concat(track.name)
    .sort(() => Math.random() - 0.5);

  document.getElementById("options").innerHTML = "";
  options.forEach(name => {
    const b = document.createElement("button");
    b.textContent = name;
    b.onclick = () => answer(name === track.name);
    document.getElementById("options").appendChild(b);
  });

  document.getElementById("score").textContent = `Poäng: ${score}`;
}

function answer(correct) {
  if (correct) score++;
  document.getElementById("next").style.display = "inline";
  index++;
}
</script>

</body>
</html>
