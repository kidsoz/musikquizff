<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Spotify Login – GitHub Test</title>
</head>
<body>

<h1>Spotify login – GitHub test</h1>

<button id="login">Logga in med Spotify</button>
<p id="status"></p>

<script>
  // ✅ BYT TILL DITT RIKTIGA CLIENT ID
  const CLIENT_ID = "cb562e24e68e49bdb497b65bc42cd010";

  const REDIRECT_URI =
    "https://kidsoz.github.io/musikquizff/";

  document.getElementById("login").onclick = () => {
    const authUrl =
      "https://accounts.spotify.com/authorize" +
      "?response_type=code" +
      "&client_id=" + CLIENT_ID +
      "&redirect_uri=" + encodeURIComponent(REDIRECT_URI);

    window.location.href = authUrl;
  };

  const params = new URLSearchParams(window.location.search);
  if (params.get("code")) {
    document.getElementById("status").textContent =
      "✅ Redirect tillbaka från Spotify fungerar";
  }
</script>

</body>
</html>
