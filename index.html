<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>🎧 Musikquiz – endast ljud</title>

<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    max-width: 700px;
    margin: 2rem auto;
  }

  button {
    width: 100%;
    padding: 0.6rem;
    margin-top: 0.4rem;
    font-size: 1rem;
  }

  /* ✅ YouTube-spelaren göms STABILT */
  #player-wrapper {
    position: fixed;
    width: 1px;
    height: 1px;
    left: -9999px;
    top: -9999px;
    overflow: hidden;
    pointer-events: none;
  }
</style>
</head>

<body>

<h1>🎧 Vilken låt är detta?</h1>

<button id="start">Starta quiz</button>

<p id="question"></p>
<div id="options"></div>
<p id="score"></p>

<!-- ✅ GÖMD YouTube-spelare -->
<div id="player-wrapper">
  <div id="player"></div>
</div>

<!-- ✅ RÄTT sätt att ladda YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* ========= QUIZDATA ========= */
const quiz = [
  {
    videoId: "fJ9rUzIMcZQ",
    start: 30,
    answer: "Bohemian Rhapsody",
    options: [
      "Bohemian Rhapsody",
      "We Will Rock You",
      "Another One Bites The Dust"
    ]
  },
  {
    videoId: "3JZ4pnNtyxQ",
    start: 42,
    answer: "Billie Jean",
    options: [
      "Beat It",
      "Thriller",
      "Billie Jean"
    ]
  }
];

let player;
let index = 0;
let score = 0;

/* ========= YOUTUBE ========= */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "1",
    width: "1",
    playerVars: {
      controls: 0,
      disablekb: 1,
      fs: 0,
      modestbranding: 1,
      rel: 0
    }
  });
}

/* ========= QUIZ ========= */
document.getElementById("start").onclick = startQuiz;

function startQuiz() {
  index = 0;
  score = 0;
  nextQuestion();
}

function nextQuestion() {
  document.getElementById("options").innerHTML = "";
  document.getElementById("score").textContent = `Poäng: ${score}`;

  const q = quiz[index];
  document.getElementById("question").textContent = "Lyssna...";

  player.loadVideoById({
    videoId: q.videoId,
    startSeconds: q.start
  });

  // ✅ spela bara ljud i 12 sek
  setTimeout(() => {
    player.pauseVideo();
  }, 12000);

  q.options
    .sort(() => Math.random() - 0.5)
    .forEach(opt => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.onclick = () => answer(opt === q.answer);
      document.getElementById("options").appendChild(btn);
    });
}

function answer(correct) {
  if (correct) {
    score++;
    alert("✅ Rätt!");
  } else {
    alert("❌ Fel!");
  }

  index++;
  if (index < quiz.length) {
    nextQuestion();
  } else {
    alert(`🎉 Klar! Poäng: ${score}/${quiz.length}`);
    player.stopVideo();
  }
}
</script>

</body>
</html>
