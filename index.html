<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Spotify OAuth + Token</title>
</head>
<body>

<h1>Spotify-inloggning</h1>

<button id="login">Logga in med Spotify</button>
<p id="status"></p>

<script>
  // ========= INSTÄLLNINGAR =========
  const CLIENT_ID = "cb562e24e68e49bdb497b65bc42cd010";
  const REDIRECT_URI = "https://kidsoz.github.io/musikquizff/";

  // ========= PKCE-HJÄLPFUNKTIONER =========
  function generateVerifier() {
    const chars =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    let verifier = "";
    const random = crypto.getRandomValues(new Uint8Array(64));
    for (let i = 0; i < random.length; i++) {
      verifier += chars[random[i] % chars.length];
    }
    return verifier;
  }

  async function generateChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest("SHA-256", data);
    const bytes = new Uint8Array(digest);
    let binary = "";
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary)
      .replace(/\+/g, "-")
      .replace(/\//g, "_")
      .replace(/=+$/, "");
  }

  // ========= LOGIN =========
  document.getElementById("login").onclick = async () => {
    const verifier = generateVerifier();
    localStorage.setItem("pkce_verifier", verifier);

    const challenge = await generateChallenge(verifier);

    const authUrl =
      "https://accounts.spotify.com/authorize" +
      "?response_type=code" +
      "&client_id=" + CLIENT_ID +
      "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
      "&code_challenge_method=S256" +
      "&code_challenge=" + challenge;

    window.location.href = authUrl;
  };

  // ========= TA EMOT CODE + BYT MOT TOKEN =========
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if (code) {
    exchangeToken(code);
  }

  async function exchangeToken(code) {
    const verifier = localStorage.getItem("pkce_verifier");

    const body = new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    });

    const response = await fetch(
      "https://accounts.spotify.com/api/token",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body
      }
    );

    if (!response.ok) {
      document.getElementById("status").textContent =
        "❌ Kunde inte hämta token";
      return;
    }

    const data = await response.json();
    localStorage.setItem("spotify_access_token", data.access_token);

    document.getElementById("status").textContent =
      "✅ Access token mottaget!";

    // Städa URL
    window.history.replaceState({}, document.title, REDIRECT_URI);
  }
</script>

</body>
</html>
