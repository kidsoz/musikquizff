<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>🎵 YouTube Musikquiz</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
    }
    button {
      padding: 0.5rem;
      width: 100%;
      margin-top: 0.5rem;
      font-size: 1rem;
    }
    iframe {
      width: 100%;
      height: 315px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<h1>🎵 YouTube Musikquiz</h1>

<button id="start">Starta quiz</button>
<p id="question"></p>

<iframe
  id="player"
  src=""
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

<div id="options"></div>
<p id="score"></p>

<script>
/* =========================
   QUIZDATA (BYGG UT!)
========================= */
const quiz = [
  {
    videoId: "fJ9rUzIMcZQ", // Queen – Bohemian Rhapsody
    correct: "Bohemian Rhapsody",
    options: ["Bohemian Rhapsody", "We Will Rock You", "Another One Bites The Dust"]
  },
  {
    videoId: "3JZ4pnNtyxQ", // Billie Jean
    correct: "Billie Jean",
    options: ["Thriller", "Beat It", "Billie Jean"]
  },
  {
    videoId: "kXYiU_JCYtU", // Numb
    correct: "Numb",
    options: ["In The End", "Numb", "Crawling"]
  }
];

let index = 0;
let score = 0;

document.getElementById("start").onclick = startQuiz;

function startQuiz() {
  index = 0;
  score = 0;
  nextQuestion();
}

function nextQuestion() {
  const q = quiz[index];
  document.getElementById("question").textContent = "Vilken låt är detta?";
  document.getElementById("score").textContent = `Poäng: ${score}`;

  // startar videon på 30s och autoplay
  document.getElementById("player").src =
    `https://www.youtube.com/embed/${q.videoId}?start=30&autoplay=1`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = () => answer(opt === q.correct);
    optionsDiv.appendChild(btn);
  });
}

function answer(correct) {
  if (correct) {
    alert("✅ Rätt!");
    score++;
  } else {
    alert("❌ Fel!");
  }

  index++;
  if (index < quiz.length) {
    nextQuestion();
  } else {
    alert(`🎉 Quiz klart! Poäng: ${score}/${quiz.length}`);
    document.getElementById("player").src = "";
  }
}
</script>

</body>
</html>
