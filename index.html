<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>🎧 Musikquiz – Samtidiga svar</title>

<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    max-width: 850px;
    margin: 2rem auto;
    background: #020617;
    color: #e5e7eb;
  }

  h1, h2 { text-align: center; }

  .card {
    background: #020617;
    border-radius: 16px;
    padding: 1.2rem;
    margin-top: 1rem;
    border: 1px solid #1e293b;
  }

  button, select {
    width: 100%;
    padding: 0.7rem;
    font-size: 1rem;
    border-radius: 10px;
    border: none;
    margin-top: 0.5rem;
    cursor: pointer;
  }

  button { background: #2563eb; color: white; }
  button.secondary { background: #475569; }

  .timer {
    font-size: 2.4rem;
    text-align: center;
    margin: 0.5rem 0;
  }

  .scores {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  #player-wrapper {
    position: fixed;
    width: 1px;
    height: 1px;
    left: -9999px;
    top: -9999px;
    overflow: hidden;
    pointer-events: none;
  }
</style>
</head>

<body>

<h1>🎧 Musikquiz – 90‑talister</h1>

<div class="card">
  <label>Svårighetsnivå:</label>
  <select id="difficulty">
    <option value="easy">🟢 Lätt</option>
    <option value="medium">🟡 Medel</option>
    <option value="hard">🔴 Svår</option>
  </select>
  <button id="start">Starta quiz</button>
</div>

<div class="card scores">
  <span id="scoreA">Lag A: 0</span>
  <span id="scoreB">Lag B: 0</span>
</div>

<div class="card">
  <div class="timer" id="timer">12</div>
  <h2 id="question">Tryck start…</h2>

  <button id="showAnswer" class="secondary" style="display:none;">
    Visa rätt svar
  </button>

  <p id="answer" style="text-align:center;font-size:1.3rem;"></p>

  <div class="scores">
    <button onclick="addPoint('A')">+1 Lag A</button>
    <button onclick="addPoint('B')">+1 Lag B</button>
  </div>

  <button id="next" class="secondary" style="display:none;">Nästa låt</button>
</div>

<div id="player-wrapper">
  <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* ===== LÅTDATA ===== */
const quizData = [
  { videoId: "CevxZvSJLk8", title: "Mr Brightside", artist: "The Killers" },
  { videoId: "kXYiU_JCYtU", title: "Numb", artist: "Linkin Park" },
  { videoId: "dvgZkm1xWPE", title: "Bad Romance", artist: "Lady Gaga" },
  { videoId: "bo_efYhYU2A", title: "Yeah!", artist: "Usher" },
  { videoId: "hTWKbfoikeg", title: "Smells Like Teen Spirit", artist: "Nirvana" }
];

let player;
let index = 0;
let timeLeft = 12;
let timer;
let scoreA = 0;
let scoreB = 0;

/* ===== YOUTUBE ===== */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "1",
    width: "1",
    playerVars: { controls: 0 }
  });
}

/* ===== QUIZ ===== */
document.getElementById("start").onclick = startQuiz;
document.getElementById("next").onclick = nextQuestion;
document.getElementById("showAnswer").onclick = showAnswer;

function startQuiz() {
  index = 0;
  scoreA = 0;
  scoreB = 0;
  updateScores();
  nextQuestion();
}

function nextQuestion() {
  if (index >= quizData.length) {
    alert(`🎉 Quiz klart!\nLag A: ${scoreA}\nLag B: ${scoreB}`);
    player.stopVideo();
    return;
  }

  clearInterval(timer);
  document.getElementById("answer").textContent = "";
  document.getElementById("showAnswer").style.display = "none";
  document.getElementById("next").style.display = "none";

  const q = quizData[index];
  const diff = document.getElementById("difficulty").value;
  const startTime = diff === "easy" ? 55 : diff === "medium" ? 35 : 10;

  document.getElementById("question").textContent =
    "Skriv ner: Vilken låt + artist är detta?";

  timeLeft = 12;
  updateTimer();

  player.loadVideoById({ videoId: q.videoId, startSeconds: startTime });

  timer = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft === 0) endRound();
  }, 1000);
}

function endRound() {
  clearInterval(timer);
  player.pauseVideo();
  document.getElementById("showAnswer").style.display = "block";
}

function showAnswer() {
  const q = quizData[index];
  document.getElementById("answer").textContent =
    `✅ ${q.title} – ${q.artist}`;

  index++; // ✅ HÄR ÄR FIXEN – gå vidare till nästa låt
  document.getElementById("next").style.display = "block";
}

function addPoint(team) {
  team === "A" ? scoreA++ : scoreB++;
  updateScores();
}

function updateScores() {
  document.getElementById("scoreA").textContent = `Lag A: ${scoreA}`;
  document.getElementById("scoreB").textContent = `Lag B: ${scoreB}`;
}

function updateTimer() {
  document.getElementById("timer").textContent = timeLeft;
}
</script>

</body>
</html>
