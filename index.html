<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>🎶 Musikquiz V4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🎶 Musikquiz</h1>
  <div class="theme-selector">
    <label>Tema:</label>
    <select id="theme">
      <option value="90s">90‑talister</option>
      <option value="pop">Pop</option>
      <option value="rock">Rock</option>
    </select>
  </div>
</header>

<main>
  <section class="card">
    <div class="timer" id="timer">–</div>
    <h2 id="instruction">Redo</h2>

    <button id="start">Starta låt</button>
    <button id="showAnswer" class="hidden">Visa facit</button>
    <p id="answer"></p>

    <div class="bonus">
      <button onclick="bonus('A')">+2 Bonus Lag A</button>
      <button onclick="penalty('A')">−1 Straff Lag A</button>
      <button onclick="bonus('B')">+2 Bonus Lag B</button>
      <button onclick="penalty('B')">−1 Straff Lag B</button>
    </div>

    <div class="scores">
      <span>Lag A: <strong id="scoreA">0</strong></span>
      <span>Lag B: <strong id="scoreB">0</strong></span>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
