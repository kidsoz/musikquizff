<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <title>🎵 Spotify Musikquiz</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      line-height: 1.5;
    }
    button {
      padding: 0.5rem 1rem;
      margin: 0.5rem 0.25rem 0 0;
      font-size: 1rem;
      cursor: pointer;
    }
    #options button {
      display: block;
      width: 100%;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>🎵 Spotify Musikquiz</h1>

<p>
  Klistra in ett <strong>Spotify Playlist ID</strong> (t.ex. Top 50 Global):
</p>

<input id="playlistId" placeholder="t.ex. 37i9dQZF1DXcBWIGoYBM5M" style="width:100%;padding:0.5rem;" />
<br />
<button id="start">Starta quiz</button>

<p id="status"></p>

<hr />

<h2 id="question"></h2>

<audio id="audio" controls></audio>

<div id="options"></div>

<p id="score"></p>
<button id="next" style="display:none;">Nästa låt</button>

<script>
  // ✅ DIN CLOUDFARE WORKER (PROXY)
  const PROXY_URL = "https://spotify-proxy.joeljohansson89.workers.dev";

  let tracks = [];
  let index = 0;
  let score = 0;

  document.getElementById("start").onclick = loadPlaylist;
  document.getElementById("next").onclick = nextQuestion;

  async function loadPlaylist() {
    const playlistId = document.getElementById("playlistId").value.trim();
    const status = document.getElementById("status");

    if (!playlistId) {
      status.textContent = "❌ Ange ett playlist‑ID";
      return;
    }

    status.textContent = "⏳ Laddar spellista…";

    const res = await fetch(`${PROXY_URL}/?playlist=${playlistId}`);

    if (!res.ok) {
      status.textContent = "❌ Kunde inte läsa spellistan";
      return;
    }

    const data = await res.json();

    // plocka ut tracks med preview
    tracks = data.items
      .map(i => i.track)
      .filter(t => t && t.preview_url);

    if (tracks.length < 3) {
      status.textContent = "❌ För få låtar med preview i spellistan";
      return;
    }

    index = 0;
    score = 0;
    status.textContent = `✅ ${tracks.length} låtar laddade`;
    nextQuestion();
  }

  function nextQuestion() {
    document.getElementById("next").style.display = "none";
    document.getElementById("options").innerHTML = "";

    const track = tracks[index];
    document.getElementById("question").textContent = "Vilken låt är detta?";
    document.getElementById("audio").src = track.preview_url;
    document.getElementById("audio").play();

    const choices = createOptions(track.name);
    choices.forEach(name => {
      const btn = document.createElement("button");
      btn.textContent = name;
      btn.onclick = () => answer(name === track.name);
      document.getElementById("options").appendChild(btn);
    });

    document.getElementById("score").textContent = `Poäng: ${score}`;
  }

  function createOptions(correct) {
    const others = tracks
      .filter(t => t.name !== correct)
      .sort(() => Math.random() - 0.5)
      .slice(0, 2)
      .map(t => t.name);

    return [...others, correct].sort(() => Math.random() - 0.5);
  }

  function answer(isCorrect) {
    if (isCorrect) {
      alert("✅ Rätt!");
      score++;
    } else {
      alert("❌ Fel!");
    }

    document.getElementById("score").textContent = `Poäng: ${score}`;
    document.getElementById("next").style.display = "inline";

    index++;
    if (index >= tracks.length) {
      alert(`🎉 Quiz klart! Slutpoäng: ${score}`);
      index = 0;
      score = 0;
    }
  }
</script>

</body>
</html>
